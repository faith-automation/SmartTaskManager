<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #5a4bd6,#7b68ee);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 6px 20px rgba(255, 182, 193, 0.4);
            text-align: center;
        }
        h1 {
            color: #7b68ee;
        }

        h2 {
            color: #7b68ee;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #7b68ee;
        }

        input:focus {
            outline: none;
            border: 1px solid #7b68ee;
            box-shadow: 0 0 5px rgba(236, 64, 122, 0.4);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #7b68ee;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #7b68ee;
        }
        
.password-container{
    display:flex;
    align-items:center;
}

.password-container input{
    flex:1;
}

.password-container span{
    margin-left:8px;
    font-size:18px;
}

    </style>
</head>
<body>

<div class="card">
    <h1> ✔ TaskFlow</h1>
    <h2>Register</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <br>
        <div class="password-container">
            <input type="password" id="password" name="password" placeholder="Password" required>
            <span onclick="togglePassword('password')" style="cursor:pointer;">👁️</span>
        </div>
        <br>
        <div class="password-container">
           <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
           <span onclick="togglePassword('confirm_password')" style="cursor:pointer;">👁️</span>
        </div>
        <button type="submit">Create Account</button>
    </form>

    <a href="/login">Already have an account? Login</a>
</div>
<script>
function togglePassword(fieldId) {

    const field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }

}
</script>
</body>
</html>
