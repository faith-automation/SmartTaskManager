<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe6f0, #ffd6eb);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff0f6;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 6px 20px rgba(255, 182, 193, 0.4);
            text-align: center;
        }
        h1 {
            color: #d63384;
        }

        h2 {
            color: #d63384;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #f8bbd0;
        }

        input:focus {
            outline: none;
            border: 1px solid #ec407a;
            box-shadow: 0 0 5px rgba(236, 64, 122, 0.4);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff80ab;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.85;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #c2185b;
        }
        
.password-container{
    display:flex;
    align-items:center;
}

.password-container input{
    flex:1;
}

.password-container span{
    margin-left:8px;
    font-size:18px;
}

    </style>
</head>
<body>

<div class="card">
    <h1>Smart Task Manager</h1>
    <h2>🌸 Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <div class="password-container">
          <input type="password" id="password" name="password" placeholder="Password" required>
          <span onclick="togglePassword()" style="cursor:pointer;">👁️</span>
        </div>
        
        <button type="submit">Login</button>
    </form>

    <a href="/register">Don't have an account? Register</a>
</div>
<script>

function togglePassword(fieldId) {

    const field = document.getElementById(fieldId);

    if (field.type === "password") {
        field.type = "text";
    } else {
        field.type = "password";
    }

}

</script>
</body>
</html>
